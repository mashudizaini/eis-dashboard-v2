version: "3.9"

services:
  # ─────────────────────────────────────────
  # BACKEND — FastAPI (EIS API)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eis_backend
    env_file: .env
    volumes:
      - ./backend:/app
      - oracle_client:/opt/oracle
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eis_net
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────
  # CELERY WORKER — ETL & Async Tasks
  # ─────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eis_celery_worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - oracle_client:/opt/oracle
    depends_on:
      - redis
      - postgres
    networks:
      - eis_net
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  # ─────────────────────────────────────────
  # CELERY BEAT — Task Scheduler
  # ─────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eis_celery_beat
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - eis_net
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ─────────────────────────────────────────
  # FRONTEND — React + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eis_frontend
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - eis_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NGINX — Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eis_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:80"
    depends_on:
      - backend
      - frontend
    networks:
      - eis_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # POSTGRESQL — Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: eis_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eis_dashboard}
    volumes:
      - eis_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eis_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eis_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # REDIS — Cache + Celery Broker
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eis_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-eis_redis}
    volumes:
      - eis_redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-eis_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eis_net
    restart: unless-stopped

networks:
  eis_net:
    driver: bridge

volumes:
  eis_postgres_data:
  eis_redis_data:
  oracle_client:
